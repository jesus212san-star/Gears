<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gears of War: Judgment - Real Experience</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        
        /* FONDO: Aquí puedes poner el link de la imagen o un video */
        .game-screen {
            position: absolute; width: 110%; height: 110%;
            background: url('https://i.ytimg.com/vi/9w4XlK5QzQU/maxresdefault.jpg') no-repeat center;
            background-size: cover;
            transition: transform 0.1s;
            z-index: 1;
        }

        /* HUD ESTILO GEARS */
        .hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        .weapon-box {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); border: 2px solid #8b0000;
            padding: 15px; color: white; text-align: center;
        }

        .hp-bar-container {
            position: absolute; top: 20px; left: 20px;
            width: 250px; height: 20px; background: #333; border: 2px solid #fff;
        }
        .hp-fill { width: 100%; height: 100%; background: #8b0000; transition: 0.3s; }

        /* MIRA */
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* BOTONES DE ACCIÓN */
        .controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 10px; z-index: 20;
        }

        .btn {
            background: #8b0000; color: white; border: none; padding: 15px 25px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Forma de placa COG */
        }
        .btn:active { background: #ff4500; }
    </style>
</head>
<body onkeydown="handleInput(event)">

    <div class="game-screen" id="scene"></div>

    <div class="hud">
        <div class="hp-bar-container"><div class="hp-fill" id="hp-bar"></div></div>
        <div class="weapon-box">
            <div id="weapon-name">LANCER</div>
            <div id="ammo-count">30 / ∞</div>
        </div>
        <div class="crosshair"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="shoot()">DISPARAR (Espacio)</button>
        <button class="btn" onclick="switchWeapon()">CAMBIAR ARMA (Q)</button>
        <button class="btn" onclick="takeCover()">COBERTURA (C)</button>
    </div>

    <script>
        let hp = 100;
        let currentWeapon = "Lancer";
        let isCovered = false;
        let posX = -5;
        let posY = -5;

        // Movimiento de cámara (Efecto de respiración/movimiento)
        function handleInput(e) {
            const scene = document.getElementById('scene');
            if(e.key === "w") posY -= 1;
            if(e.key === "s") posY += 1;
            if(e.key === "a") posX -= 1;
            if(e.key === "d") posX += 1;
            
            scene.style.transform = `translate(${posX}px, ${posY}px)`;

            // Atajos de teclado
            if(e.key === " ") shoot();
            if(e.key === "q") switchWeapon();
            if(e.key === "c") takeCover();
        }

        function shoot() {
            const flash = document.getElementById('scene');
            flash.style.filter = "brightness(1.5)";
            setTimeout(() => flash.style.filter = "brightness(1)", 50);
            
            let damage = currentWeapon === "Lancer" ? 10 : 40;
            console.log("Disparando con " + currentWeapon + " - Daño: " + damage);
            
            // Simular contraataque
            if(!isCovered) {
                hp -= 5;
                document.getElementById('hp-bar').style.width = hp + "%";
            }
        }

        function switchWeapon() {
            currentWeapon = (currentWeapon === "Lancer") ? "Gnasher" : "Lancer";
            document.getElementById('weapon-name').innerText = currentWeapon.toUpperCase();
            document.getElementById('ammo-count').innerText = currentWeapon === "Lancer" ? "30 / ∞" : "8 / ∞";
        }

        function takeCover() {
            isCovered = !isCovered;
            const scene = document.getElementById('scene');
            scene.style.transform = isCovered ? "scale(1.1) translateY(20px)" : "scale(1)";
            document.getElementById('scene').style.filter = isCovered ? "grayscale(0.5)" : "none";
        }
    </script>
</body>
</html>
