<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears of War: Judgment - The HUD Experience</title>
    <style>
        :root {
            --cog-red: #8b0000;
            --blood: rgba(139, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🖼️ FONDO CINEMÁTICO */
        .game-world {
            position: absolute; width: 100%; height: 100%;
            background: url('https://i.ytimg.com/vi/9w4XlK5QzQU/maxresdefault.jpg') no-repeat center;
            background-size: cover;
            filter: contrast(1.2) brightness(0.8) sepia(0.2);
            z-index: 1;
            transition: transform 0.05s ease-out;
        }

        /* 🩸 EFECTO DE DAÑO (SANGRE EN PANTALLA) */
        .blood-overlay {
            position: absolute; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px #000;
            z-index: 2; pointer-events: none;
            transition: background 0.2s;
        }

        /* 📊 HUD - MUNICIÓN Y ARMA (Arriba Derecha) */
        .weapon-hud {
            position: absolute; top: 30px; right: 40px;
            z-index: 10; color: #fff; text-align: right;
            text-shadow: 2px 2px 4px #000;
        }

        .weapon-icon { width: 120px; filter: invert(1); }
        .ammo { font-size: 2em; font-weight: bold; margin-top: -10px; }

        /* 🏥 HUD - VIDA (Arriba Izquierda) */
        .health-hud {
            position: absolute; top: 30px; left: 40px;
            z-index: 10; display: flex; align-items: center;
        }

        .crimson-omen {
            width: 60px; opacity: 0.8;
            filter: drop-shadow(0 0 10px var(--cog-red));
        }

        /* 🎮 CONTROLES INFERIORES */
        .controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            z-index: 10;
        }

        .btn-action {
            background: rgba(0, 0, 0, 0.7);
            color: #ccc; border: 1px solid #444;
            padding: 12px 30px; cursor: pointer;
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.2s;
        }

        .btn-action:hover {
            border-color: var(--cog-red); color: #fff;
            background: rgba(139, 0, 0, 0.3);
        }

        /* 💥 FLASH DE DISPARO */
        .muzzle-flash {
            position: absolute; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body onkeydown="controls(event)">

    <div class="muzzle-flash" id="flash"></div>
    <div class="blood-overlay" id="blood"></div>
    <div class="game-world" id="world"></div>

    <div class="health-hud">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Gears_of_War_logo.svg/1024px-Gears_of_War_logo.svg.png" class="crimson-omen" id="omen">
        <div style="margin-left: 15px; color: white; font-weight: bold; font-size: 1.2em;">BAIRD</div>
    </div>

    <div class="weapon-hud">
        <div style="font-size: 0.8em; letter-spacing: 3px;">LANCER MK2</div>
        <div class="ammo" id="ammo">30 / 480</div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="fire()">DISPARAR [ESPACIO]</button>
        <button class="btn-action" onclick="reload()">RECARGAR [R]</button>
    </div>

    <script>
        let ammo = 30;
        let hp = 100;

        function fire() {
            if (ammo > 0) {
                ammo--;
                document.getElementById('ammo').innerText = ammo + " / 480";
                
                // Efecto visual de retroceso
                const world = document.getElementById('world');
                world.style.transform = `scale(1.02) translate(${Math.random()*4}px, -${Math.random()*4}px)`;
                setTimeout(() => world.style.transform = "scale(1)", 50);

                // Flash de disparo
                const flash = document.getElementById('flash');
                flash.style.opacity = "0.2";
                setTimeout(() => flash.style.opacity = "0", 30);
                
                // Simular que te disparan de vuelta a veces
                if(Math.random() > 0.8) receiveDamage();
            } else {
                alert("¡SIN MUNICIÓN! Pulsa 'R'");
            }
        }

        function reload() {
            ammo = 30;
            document.getElementById('ammo').innerText = ammo + " / 480";
            console.log("Recarga completada");
        }

        function receiveDamage() {
            hp -= 20;
            const blood = document.getElementById('blood');
            const omen = document.getElementById('omen');
            
            blood.style.background = `radial-gradient(circle, transparent 30%, var(--blood) 100%)`;
            omen.style.opacity = (100 - hp) / 100 + 0.2;
            
            setTimeout(() => {
                blood.style.background = "transparent";
            }, 500);

            if(hp <= 0) {
                alert("SQUAD KILO CAÍDO. Reiniciando testimonio...");
                location.reload();
            }
        }

        function controls(e) {
            if(e.code === "Space") fire();
            if(e.code === "KeyR") reload();
        }
    </script>
</body>
</html>
